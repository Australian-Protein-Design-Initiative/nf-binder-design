      id: B
      res_index: 50 # The res_index'th residue will be a designed one (starting to count from 1)
      num_residues: 1..5
  - insertion:
      id: B
      res_index: 97 # The res_index'th residue will be a designed one (starting to count from 1)
      num_residues: 1..12

# reindex the residue index which is used in the positional encoding
reset_res_index:
  - chain:
      id: B