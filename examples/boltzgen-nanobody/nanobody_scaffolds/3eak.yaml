# h-NbBcII10FGLA universal scaffold
path: 3eak.pdb
include: 
  - chain: 
      id: B

design:
  - chain:
      id: B
      res_index: 25..34,52..57,99..114

structure_groups:
  - group:
      id: B
      visibility: 2
  - group:
      id: B
      visibility: 0
      res_index: 25..34,52..57,99..114

exclude: 
  - chain:
      id: B
      res_index: 25..27 # take out 3 from CDR1
  - chain:
      id: B
      res_index: 52..54 # take out 3 from CDR2
  - chain:
      id: B
      res_index: 99..105 # take out 7 from CDR3

design_insertions:
  - insertion:
      id: B
      res_index: 25 # The res_index'th residue will be a designed one (starting to count from 1)
      num_residues: 5..12 # allow flexible length for CDR1
  - insertion:
      id: B
      res_index: 52 # The res_index'th residue will be a designed one (starting to count from 1)
      num_residues: 3..8 # allow flexible length for CDR2
  - insertion:
      id: B
      res_index: 99 # The res_index'th residue will be a designed one (starting to count from 1)
      num_residues: 7..20 # allow flexible length for CDR3

# reindex the residue index which is used in the positional encoding
reset_res_index:
  - chain:
      id: B
